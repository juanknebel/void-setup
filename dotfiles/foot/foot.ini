font=monospace:size=10
pad=10x10
# Launch zsh as login shell (-l loads ~/.zprofile and ~/.zshrc). Mirrors
# what alacritty.toml does in its [terminal.shell] block — system shell
# stays bash, terminals open zsh on their own.
shell=/usr/bin/zsh -l

# Foot deprecated the plain [colors] section in favor of [colors-dark] and
# [colors-light], picked by the compositor based on the system's color-scheme
# preference. We define the same Breeze Dark palette under both so the look
# is consistent regardless of the reported mode (matches alacritty.toml).
[colors-dark]
alpha=1.0
background=232627
foreground=eff0f1
regular0=232627
regular1=ed1515
regular2=11d116
regular3=f67400
regular4=1d99f3
regular5=9b59b6
regular6=1abc9c
regular7=fcfcfc
bright0=7f8c8d
bright1=c0392b
bright2=1cdc9a
bright3=fdbc4b
bright4=3daee9
bright5=8e44ad
bright6=16a085
bright7=ffffff

[colors-light]
alpha=1.0
background=232627
foreground=eff0f1
regular0=232627
