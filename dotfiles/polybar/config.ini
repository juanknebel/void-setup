[colors]
bg         = #232629
fg         = #eff0f1
accent     = #3daee9
muted      = #7f8c8d
separator  = #4d4d4d
urgent     = #ed1515
selection  = #31363b

[bar/main]
width  = 100%
height = 32
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size  = 2
line-color = ${colors.accent}

border-size  = 0
padding-left  = 1
padding-right = 1
module-margin = 1

# JetBrainsMono Nerd Font for Nerd Font glyphs (icons)
# Noto Sans for regular text (matches i3 font)
font-0 = "Noto Sans:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=11;2"

modules-left   = i3
modules-center = date
modules-right  = cpu memory temperature separator backlight pulseaudio separator network bluetooth separator battery tray

cursor-click  = pointer
cursor-scroll = ns-resize

wm-restack = i3

[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent    = true
strip-wsnumbers = true

format = <label-state> <label-mode>

label-focused            = %index%
label-focused-background = ${colors.selection}
label-focused-foreground = ${colors.accent}
label-focused-border-color = ${colors.accent}
label-focused-border-size  = 2
label-focused-padding      = 2

label-unfocused            = %index%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding    = 2

label-visible            = %index%
label-visible-foreground = ${colors.fg}
label-visible-padding    = 2

label-urgent            = %index%
label-urgent-background = ${colors.urgent}
label-urgent-padding    = 2

label-mode            = %mode%
label-mode-background = ${colors.urgent}
label-mode-padding    = 2

[module/date]
type     = internal/date
interval = 30

date     = %a %d %b
time     = %H:%M
timezone = America/Argentina/Buenos_Aires

label            = %{F#3daee9}󰥔%{F-}  %time%  %date%
label-foreground = ${colors.fg}

[module/cpu]
type     = internal/cpu
interval = 5

format-prefix            = "󰍛 "
format-prefix-foreground = ${colors.accent}
label                    = %percentage:2%%

[module/memory]
type     = internal/memory
interval = 5

format-prefix            = " "
format-prefix-foreground = ${colors.accent}
label                    = %percentage_used:2%%

[module/temperature]
type     = internal/temperature
interval = 5
# Thermal zone 0 — CPU package on X61 (Core 2 Duo)
thermal-zone = 0
warn-temperature = 70

format-prefix            = " "
format-prefix-foreground = ${colors.accent}
label                    = %temperature-c%
label-warn               = %temperature-c%
label-warn-foreground    = ${colors.urgent}

[module/separator]
type    = custom/text
content = |
content-foreground = ${colors.separator}

[module/backlight]
type = internal/backlight
card = intel_backlight

format-prefix            = "󰃟 "
format-prefix-foreground = ${colors.accent}
label                    = %percentage%%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix            = "󰕾 "
format-volume-prefix-foreground = ${colors.accent}
label-volume                    = %percentage%%

label-muted            = "󰖁 muted"
label-muted-foreground = ${colors.muted}

click-right = alacritty --class pulsemixer,Alacritty -e pulsemixer

[module/network]
type = internal/network
interface-type = wireless
interval = 5

format-connected-prefix            = "󰖩 "
format-connected-prefix-foreground = ${colors.accent}
label-connected                    = %essid%

format-disconnected-prefix            = "󰖪 "
format-disconnected-prefix-foreground = ${colors.muted}
label-disconnected                    = "off"
label-disconnected-foreground         = ${colors.muted}

click-left = alacritty --class nmtui,Alacritty -e nmtui

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep -q "Powered: yes" && echo "󰂯" || echo "󰂲"
interval = 10
format-foreground = ${colors.accent}

click-left = alacritty --class bluetui,Alacritty -e bluetui

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 98
poll-interval = 30

format-charging-prefix            = "󰂄 "
format-charging-prefix-foreground = ${colors.accent}
label-charging                    = %percentage%%

format-discharging-prefix            = "󰁾 "
format-discharging-prefix-foreground = ${colors.accent}
label-discharging                    = %percentage%%

format-full-prefix            = "󰁹 "
format-full-prefix-foreground = ${colors.accent}

label-low            = %percentage%%
label-low-foreground = ${colors.urgent}
low-at = 15

[module/tray]
type = internal/tray
tray-spacing = 4px
