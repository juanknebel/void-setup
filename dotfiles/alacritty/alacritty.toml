# ~/.config/alacritty/alacritty.toml
# Void Linux / ThinkPad X220 Tablet
# System shell = bash; Alacritty launches zsh without touching chsh.
# Theme: Breeze Dark (Plasma 6) to match the desktop palette.

# ---------------------------------------------------------------------------
# Shell: launch zsh as a login shell ONLY inside Alacritty
# ---------------------------------------------------------------------------
[terminal.shell]
program = "/usr/bin/zsh"
args = ["-l"]            # -l = login shell (loads ~/.zprofile and ~/.zshrc)

# ---------------------------------------------------------------------------
# Window
# ---------------------------------------------------------------------------
[window]
opacity = 0.97
padding = { x = 8, y = 8 }
dynamic_padding = true
decorations = "full"
dynamic_title = true

# ---------------------------------------------------------------------------
# Font — JetBrainsMono Nerd Font (installed via nerd-fonts-ttf)
# ---------------------------------------------------------------------------
[font]
size = 11.0
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

# ---------------------------------------------------------------------------
# Scrollback
# ---------------------------------------------------------------------------
[scrolling]
history = 10000
multiplier = 3

# ---------------------------------------------------------------------------
# Cursor
# ---------------------------------------------------------------------------
[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600

# ---------------------------------------------------------------------------
# Colors — Breeze Dark (official Konsole / Plasma 6 palette)
# ---------------------------------------------------------------------------
[colors.primary]
background = "#232627"     # Konsole Breeze Dark background
foreground = "#eff0f1"     # Breeze Dark foreground

[colors.cursor]
text = "#232627"
cursor = "#eff0f1"

[colors.selection]
text = "CellForeground"
background = "#3daee9"     # Breeze selection blue

[colors.normal]
black   = "#232627"
red     = "#ed1515"
green   = "#11d116"
yellow  = "#f67400"
blue    = "#1d99f3"
magenta = "#9b59b6"
cyan    = "#1abc9c"
white   = "#fcfcfc"

[colors.bright]
black   = "#7f8c8d"
red     = "#c0392b"
green   = "#1cdc9a"
yellow  = "#fdbc4b"
blue    = "#3daee9"
magenta = "#8e44ad"
cyan    = "#16a085"
white   = "#ffffff"

# ---------------------------------------------------------------------------
# Useful keybindings
# ---------------------------------------------------------------------------
[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "Plus",  mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0",  mods = "Control", action = "ResetFontSize" },
  { key = "F11", mods = "None", action = "ToggleFullscreen" },
  { key = "Return", mods = "Shift", chars = "\u001B\r"},
]
