# picom.conf — ThinkPad X61 Tablet / Intel GMA X3100
# Uses the xrender backend (glx has rendering bugs on the 965GM chipset).
# Minimal effects: subtle shadows only, no blur (CPU cost on Core 2 Duo).

backend = "xrender";

# Shadows
shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.4;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 5;

# Opacity — keep all windows fully opaque except the terminal
opacity-rule = [
    "95:class_g = 'Alacritty'"
];

# Focus tracking
detect-client-opacity = true;
detect-rounded-corners = true;

# Vsync — reduces tearing on Intel xrender
vsync = true;

# Performance
use-damage = true;
log-level = "warn";
